<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gravura Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Header ── -->
  <header id="header">
    <div class="header-brand">
      <div class="logo-mark">G</div>
      <div class="brand-text">
        <span class="brand-name">GRAVURA</span>
        <span class="brand-sep">/</span>
        <span class="brand-sub">VIEWER</span>
      </div>
    </div>

    <div class="header-search">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search" placeholder="Search city, country, filename…" autocomplete="off" spellcheck="false">
      <kbd class="search-hint">⌘K</kbd>
    </div>

    <div class="header-right">
      <div id="stats-bar"></div>
      <button class="icon-btn" id="refresh-btn" title="Refresh scan (R)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Layout ── -->
  <div id="layout">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <span>Library</span>
        <button class="text-btn" id="all-btn" title="Show all posters">All</button>
      </div>
      <nav id="sidebar-tree">
        <div class="loading-sidebar">
          <span class="spinner"></span>
        </div>
      </nav>
    </aside>

    <!-- Main area -->
    <main id="main">

      <!-- Toolbar -->
      <div id="toolbar">
        <div id="breadcrumb"></div>
        <div class="toolbar-right">
          <select id="status-filter" title="Filter by publish status">
            <option value="">All status</option>
            <option value="published">● Published</option>
            <option value="pending">○ Pending</option>
          </select>
          <select id="sort-select" title="Sort order">
            <option value="mtime">Recent first</option>
            <option value="name">Name A→Z</option>
            <option value="size">Largest first</option>
          </select>
          <div class="view-toggle" id="view-toggle">
            <button class="view-btn active" data-view="grid" title="Grid view (G)">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
                <rect x="3" y="3"  width="8" height="8" rx="1.5"/>
                <rect x="13" y="3" width="8" height="8" rx="1.5"/>
                <rect x="3" y="13" width="8" height="8" rx="1.5"/>
                <rect x="13" y="13" width="8" height="8" rx="1.5"/>
              </svg>
            </button>
            <button class="view-btn" data-view="list" title="List view (L)">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="9" y1="6"  x2="21" y2="6"/>
                <line x1="9" y1="12" x2="21" y2="12"/>
                <line x1="9" y1="18" x2="21" y2="18"/>
                <circle cx="4" cy="6"  r="1.5" fill="currentColor" stroke="none"/>
                <circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/>
                <circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/>
              </svg>
            </button>
          </div>
          <span id="count-label" class="count-label"></span>
        </div>
      </div>

      <!-- Content -->
      <div id="content-area">
        <div id="poster-grid" class="grid-view"></div>
        <div id="pagination"></div>
        <div id="empty-state" class="hidden">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
            <path d="M16 3H8a2 2 0 0 0-2 2v2h12V5a2 2 0 0 0-2-2z"/>
          </svg>
          <p>No posters found</p>
          <small>Try adjusting your filters or search query</small>
        </div>
        <div id="loading-state" class="hidden">
          <span class="spinner spinner-lg"></span>
          <p>Scanning posters directory…</p>
        </div>
      </div>

    </main>
  </div>

  <!-- ── Poster detail modal ── -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-box" id="modal-box">

      <div class="modal-header">
        <span id="modal-title" class="modal-title"></span>
        <div class="modal-header-actions">
          <button class="icon-btn" id="modal-prev" title="Previous poster (←)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <button class="icon-btn" id="modal-next" title="Next poster (→)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </button>
          <button class="icon-btn" id="modal-close" title="Close (Esc)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="modal-body">
        <!-- Preview panel -->
        <div class="modal-preview" id="modal-preview">
          <div class="preview-img-wrap" id="preview-img-wrap">
            <img id="preview-img" src="" alt="" loading="lazy">
            <div class="preview-placeholder hidden" id="preview-placeholder">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
              <span>No thumbnail</span>
            </div>
          </div>
        </div>

        <!-- Metadata panel -->
        <div class="modal-meta" id="modal-meta">
          <div class="meta-section">
            <h3 class="meta-heading">File</h3>
            <table class="meta-table" id="meta-file"></table>
          </div>
          <div class="meta-section">
            <h3 class="meta-heading">Publish</h3>
            <table class="meta-table" id="meta-publish"></table>
          </div>
          <div class="meta-section" id="meta-dam-section">
            <h3 class="meta-heading">DAM URLs</h3>
            <div id="meta-dam"></div>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost" id="btn-open-png" title="Open full-resolution PNG in new tab">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          Full size PNG
        </button>
        <button class="btn btn-ghost" id="btn-open-thumb" title="Open thumbnail PNG in new tab">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 3 21 3 21 9"/>
            <path d="M10 14 21 3"/>
            <path d="M21 15v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/>
          </svg>
          Thumbnail
        </button>
        <button class="btn btn-primary" id="btn-open-pdf" title="Open print-ready PDF">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
          View PDF
        </button>
      </div>

    </div>
  </div>

  <!-- ── PDF viewer modal ── -->
  <div id="pdf-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop" id="pdf-backdrop"></div>
    <div class="pdf-modal-box">
      <div class="pdf-modal-header">
        <span id="pdf-modal-title"></span>
        <div style="display:flex;gap:6px">
          <a class="btn btn-ghost btn-sm" id="pdf-download-btn" download title="Download PDF">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download
          </a>
          <button class="icon-btn" id="pdf-close" title="Close (Esc)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>
      <iframe id="pdf-iframe" src="" title="PDF viewer"></iframe>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
